# Simple GitHub Actions workflow to check your code
name: Beginner Code Check

on: [push, pull_request]

jobs:
  check-my-code:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Download project code from GitHub
        uses: actions/checkout@v4

      - name: 2. Set up Python on the cloud machine
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Install code checker (Ruff)
        run: pip install ruff

      - name: 4. Run Ruff to scan code for errors or typos
        run: ruff check .
